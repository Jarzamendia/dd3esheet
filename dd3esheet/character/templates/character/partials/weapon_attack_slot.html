<article class="attack-card attack-card--compact{% if not w %} is-empty{% endif %}" data-sheet-table="weapon-attack" data-slot="{{ slot }}" id="{% if w %}weaponCard-{{ w.id }}{% else %}weaponCard-empty-{{ slot }}{% endif %}">
    <div class="attack-card-head">
        <div class="ah-first">Ataque</div>
        <div>Bonus de Ataque</div>
        <div>Dano</div>
        <div>Sucesso Decisivo</div>
    </div>
    <div class="attack-card-row">
        <input class="sheet-input" name="weapon_{{ slot }}_Attack" value="{% if w.Attack %}{{ w.Attack }}{% else %}{{ w.Name|default:'' }}{% endif %}" data-field="weapon.Attack" data-slot="{{ slot }}">
        <div class="attack-bonus-calc" data-derived="weapon.AttackBonus" data-slot="{{ slot }}" title="Bonus de ataque (calculado): BBA + mod. de habilidade + tamanho" style="background: var(--calc-bg); color: var(--ink);">{{ w.AttackBonus|default:'' }}</div>
        <input class="sheet-input" name="weapon_{{ slot }}_Damage" value="{{ w.Damage|default:'' }}" data-field="weapon.Damage" data-slot="{{ slot }}">
        <input class="sheet-input" name="weapon_{{ slot }}_Critical" value="{{ w.Critical|default:'' }}" data-field="weapon.Critical" data-slot="{{ slot }}">
    </div>
    <div class="attack-meta attack-meta--values">
        <div class="label-cell">Alcance</div>
        <div class="label-cell">Tipo</div>
        <div class="label-cell">Observacoes</div>
    </div>
    <div class="attack-meta">
        <input class="sheet-input" name="weapon_{{ slot }}_Range" value="{{ w.Range|default:'' }}" data-field="weapon.Range" data-slot="{{ slot }}">
        <input class="sheet-input" name="weapon_{{ slot }}_Type" value="{{ w.Type|default:'' }}" data-field="weapon.Type" data-slot="{{ slot }}">
        <input class="sheet-input" name="weapon_{{ slot }}_Notes" value="{{ w.Notes|default:'' }}" data-field="weapon.Notes" data-slot="{{ slot }}">
    </div>
    <div class="attack-ammo">
        <span class="attack-ammo-label">Municao</span>
        <input class="attack-ammo-name sheet-input" name="weapon_{{ slot }}_AmmunitionName" value="{{ w.AmmunitionName|default:'' }}" data-field="weapon.AmmunitionName" data-slot="{{ slot }}">
        <div class="attack-ammo-boxes" aria-label="Controle de municao usada">
            <label><input type="checkbox" name="ammo_{{ slot }}_1" data-field="weapon.AmmunitionUsed" data-slot="{{ slot }}" data-index="1"><span></span></label>
            <label><input type="checkbox" name="ammo_{{ slot }}_2" data-field="weapon.AmmunitionUsed" data-slot="{{ slot }}" data-index="2"><span></span></label>
            <label><input type="checkbox" name="ammo_{{ slot }}_3" data-field="weapon.AmmunitionUsed" data-slot="{{ slot }}" data-index="3"><span></span></label>

            <label><input type="checkbox" name="ammo_{{ slot }}_5" data-field="weapon.AmmunitionUsed" data-slot="{{ slot }}" data-index="5"><span></span></label>

            <label><input type="checkbox" name="ammo_{{ slot }}_27" data-field="weapon.AmmunitionUsed" data-slot="{{ slot }}" data-index="27"><span></span></label>
            <label><input type="checkbox" name="ammo_{{ slot }}_28" data-field="weapon.AmmunitionUsed" data-slot="{{ slot }}" data-index="28"><span></span></label>

        </div>
    </div>
</article>
