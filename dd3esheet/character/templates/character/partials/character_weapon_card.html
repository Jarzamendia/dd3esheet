<form id="characterWeaponsForm"
      class="weapon-stack"
      data-sheet-table="weapon-attacks"
      aria-label="Armas e ataques"
      hx-post="{% url 'character:character' character.pk %}"
      hx-target="#characterWeaponsForm"
      hx-swap="outerHTML"
      hx-trigger="change delay:300ms">
    {% csrf_token %}
    {% for w in weapon_slots %}
        {% include "character/partials/weapon_attack_slot.html" with slot=forloop.counter %}
    {% endfor %}
</form>
