{% with money=character.charactermoney enc=character.characterotheritemobs %}
<section id="characterMoneySection" style="grid-column: 1 / -1;">
    <form id="characterMoneyForm"
          hx-post="{% url 'character:character' character.pk %}"
          hx-target="#characterMoneySection"
          hx-swap="outerHTML"
          hx-trigger="change delay:300ms">
        {% csrf_token %}
        <div class="section-title-band"><span>Dinheiro &amp; Capacidade de Carga</span></div>
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px; padding: 10px; background: var(--paper-bg);
                    border-left: 1px solid var(--rule-line);
                    border-right: 1px solid var(--rule-line);
                    border-bottom: 2px solid var(--rule-line);">
            <div class="money-block">
                <div class="money-coin">
                    <div class="coin-label">PC</div>
                    <input class="coin-slot sheet-input" name="CP" value="{{ money.CP|default:'' }}" inputmode="numeric">
                </div>
                <div class="money-coin">
                    <div class="coin-label">PP</div>
                    <input class="coin-slot sheet-input" name="SP" value="{{ money.SP|default:'' }}" inputmode="numeric">
                </div>
                <div class="money-coin">
                    <div class="coin-label">PO</div>
                    <input class="coin-slot sheet-input" name="GP" value="{{ money.GP|default:'' }}" inputmode="numeric">
                </div>
                <div class="money-coin">
                    <div class="coin-label">PL</div>
                    <input class="coin-slot sheet-input" name="PP" value="{{ money.PP|default:'' }}" inputmode="numeric">
                </div>
            </div>

            <div id="characterEncumbranceForm" class="enc-grid" aria-live="polite">
                <div class="enc-cell">
                    <input class="slot sheet-input" name="LightLoad" value="{{ enc.LightLoad|default:'' }}" inputmode="numeric">
                    <span class="label">Carga Leve</span>
                </div>
                <div class="enc-cell">
                    <input class="slot sheet-input" name="MediumLoad" value="{{ enc.MediumLoad|default:'' }}" inputmode="numeric">
                    <span class="label">Carga Media</span>
                </div>
                <div class="enc-cell">
                    <input class="slot sheet-input" name="HeavyLoad" value="{{ enc.HeavyLoad|default:'' }}" inputmode="numeric">
                    <span class="label">Carga Pesada</span>
                </div>
                <div class="enc-cell">
                    <input class="slot sheet-input" name="LiftOverHEad" value="{{ enc.LiftOverHEad|default:'' }}" inputmode="numeric">
                    <span class="label">Erguer s/ Cabeca</span>
                </div>
                <div class="enc-cell">
                    <input class="slot sheet-input" name="PushOrDrag" value="{{ enc.PushOrDrag|default:'' }}" inputmode="numeric">
                    <span class="label">Empurrar / Arrastar</span>
                </div>
            </div>
        </div>
    </form>
</section>
{% endwith %}
