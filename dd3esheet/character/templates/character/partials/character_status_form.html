{% with status=character.characterstatus %}
<form id="characterStatusForm" class="pvca-form" aria-live="polite"
      hx-post="{% url 'character:character' character.pk %}"
      hx-target="#characterStatusForm"
      hx-swap="outerHTML"
      hx-trigger="input changed delay:700ms, change delay:300ms">
    {% csrf_token %}

    <div class="pv-row" data-sheet-table="hit-points">
        <div class="tag-black">
            <span class="t-main">PV</span>
            <span class="t-sub">Pontos de Vida</span>
        </div>
        <div class="pv-total-cell">
            <input class="slot slot--lg sheet-input" name="TotalHitPoints" data-field="TotalHitPoints" value="{{ status.TotalHitPoints|default:'' }}" inputmode="numeric" title="PV total">
        </div>
        <div class="pv-cell pv-cell--wide">
            <div class="pv-current-temp">
                <input class="slot slot--lg sheet-input" name="CurrentHitPoints" value="{{ status.CurrentHitPoints|default:'' }}" inputmode="numeric" title="PVs atuais">
                <input class="slot slot--lg sheet-input" name="TemporaryHitPoints" value="{{ status.TemporaryHitPoints|default:'' }}" inputmode="numeric" title="PVs temporarios">
            </div>
        </div>
        <div class="pv-cell">
            <input class="slot slot--lg sheet-input" name="NonLethalDamager" data-field="NonLethalDamager" value="{{ status.NonLethalDamager|default:'' }}" inputmode="numeric" title="Dano por contusao">
        </div>
        <div class="pv-cell">
            <input class="slot slot--lg sheet-input" name="Speed" data-field="Speed" value="{{ status.Speed|default:'' }}" inputmode="numeric" title="Deslocamento">
        </div>
    </div>
</form>
{% endwith %}
