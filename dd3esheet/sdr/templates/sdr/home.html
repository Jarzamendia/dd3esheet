{% extends "sdr/base_sdr.html" %}

{% block sdr_content %}
    <header class="sdr-page-head">
        <div class="sdr-hero-copy">
            <h1 class="sdr-page-title">Referência — D&amp;D 3.5</h1>
            <p class="sdr-page-desc">{{ page_description }}</p>
        </div>
    </header>

    <section class="sdr-hub-grid">
        {% for category in categories %}
            <a class="sdr-hub-card" href="{{ category.url }}">
                <span class="sdr-hub-card__badge">{{ category.badge }}</span>
                <h2 class="sdr-hub-card__title">{{ category.title }}</h2>
                <p class="sdr-hub-card__desc">{{ category.description }}</p>
                <span class="sdr-chip">Abrir seção</span>
            </a>
        {% endfor %}
    </section>
{% endblock %}
