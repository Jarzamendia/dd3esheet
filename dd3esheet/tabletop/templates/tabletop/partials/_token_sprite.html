{% comment %}Sprite do token: imagem se houver, senão um fallback SVG por Kind.{% endcomment %}
{% if sprite_url %}
    <img class="tt-token__img" src="{{ sprite_url }}" alt="{{ sprite_alt|default:'Token' }}"
         loading="lazy" draggable="false">
{% elif kind == 'player' %}
    <svg class="tt-token__svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2 4 5v6c0 5 3.4 8.6 8 11 4.6-2.4 8-6 8-11V5l-8-3Zm0 2.2 6 2.25V11c0 3.9-2.5 6.9-6 8.8-3.5-1.9-6-4.9-6-8.8V6.45l6-2.25Z"/>
    </svg>
{% elif kind == 'npc' %}
    <svg class="tt-token__svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 2c-3.9 0-7 2.2-7 5v1h14v-1c0-2.8-3.1-5-7-5Z"/>
    </svg>
{% elif kind == 'object' %}
    <svg class="tt-token__svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2 3 7v10l9 5 9-5V7l-9-5Zm0 2.3 6.5 3.6L12 11.4 5.5 7.9 12 4.3ZM5 9.6l6 3.3v6.8l-6-3.3V9.6Zm14 0v6.8l-6 3.3v-6.8l6-3.3Z"/>
    </svg>
{% else %}
    <svg class="tt-token__svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C7.6 2 4 5.4 4 9.8c0 2.4 1.1 4.5 2.8 5.9.4.3.7.8.7 1.4V19a2 2 0 0 0 2 2h.5v-2h1.5v2h1v-2H14v2h.5a2 2 0 0 0 2-2v-1.9c0-.6.3-1.1.7-1.4 1.7-1.4 2.8-3.5 2.8-5.9C20 5.4 16.4 2 12 2ZM9 12a1.8 1.8 0 1 1 0-3.6A1.8 1.8 0 0 1 9 12Zm6 0a1.8 1.8 0 1 1 0-3.6A1.8 1.8 0 0 1 15 12Z"/>
    </svg>
{% endif %}
