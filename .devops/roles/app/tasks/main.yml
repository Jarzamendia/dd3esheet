---
# ============================================================
# Role: app — Build e deploy da aplicação com Docker Compose
# ============================================================

- name: Parar containers existentes (se houver)
  ansible.builtin.shell: docker compose -f docker-compose.prod.yaml down --remove-orphans
  args:
    chdir: "{{ app_dir }}"
  ignore_errors: yes

- name: Build da imagem Docker (produção)
  ansible.builtin.shell: docker compose -f docker-compose.prod.yaml build --no-cache
  args:
    chdir: "{{ app_dir }}"
  register: docker_build
  changed_when: true

- name: Mostrar log do build
  ansible.builtin.debug:
    var: docker_build.stdout_lines
  when: docker_build.stdout_lines is defined

- name: Subir aplicação com Docker Compose
  ansible.builtin.shell: docker compose -f docker-compose.prod.yaml up -d
  args:
    chdir: "{{ app_dir }}"
  register: docker_up

- name: Aguardar aplicação iniciar (healthcheck)
  ansible.builtin.uri:
    url: "http://localhost:{{ app_port }}/healthz"
    method: GET
    status_code: 200
  register: healthcheck
  retries: 10
  delay: 5
  until: healthcheck.status == 200
  ignore_errors: yes

- name: Mostrar status dos containers
  ansible.builtin.shell: docker compose -f docker-compose.prod.yaml ps
  args:
    chdir: "{{ app_dir }}"
  register: docker_ps
  changed_when: false

- name: Status da aplicação
  ansible.builtin.debug:
    var: docker_ps.stdout_lines

- name: Limpar imagens Docker não utilizadas
  ansible.builtin.shell: docker image prune -f
  changed_when: false
